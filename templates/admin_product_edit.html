<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Редагувати товар</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            color: #222;
        }

        header {
            background: #111827;
            color: white;
            padding: 24px 40px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin: 8px 0 0;
            color: #d1d5db;
        }

        main {
            padding: 40px;
            max-width: 700px;
        }

        .nav {
            margin-bottom: 24px;
        }

        .nav a {
            display: inline-block;
            margin-right: 12px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .nav a:hover {
            background: #1d4ed8;
        }

        .form-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 24px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
        }

        button {
            margin-top: 18px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        footer {
            padding: 20px 40px;
            color: #6b7280;
            font-size: 14px;
        }


        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.55);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 10px;
            padding: 24px;
            width: 420px;
            max-width: calc(100% - 40px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .modal h2 {
            margin: 0 0 10px;
            font-size: 20px;
        }

        .modal p {
            margin: 0 0 20px;
            color: #4b5563;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-actions button {
            padding: 9px 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-update-button {
            background: #e5e7eb;
            color: #374151;
        }

        .confirm-update-button {
            background: #2563eb;
            color: white;
        }


    </style>
</head>
<body>
    <header>
        <h1>Редагувати товар</h1>
        <p>Оновіть дані товару з адмін-панелі.</p>
    </header>

    <main>
        <section class="nav">
            <a href="/admin">Панель</a>
            <a href="/admin/products">Товари</a>
            <a href="/admin/products/new">Додати товар</a>
            <a href="/admin/orders">Замовлення</a>
            <a href="/admin/categories">Категорії</a>
            <a href="/admin/customers">Клієнти</a>
            <a href="/admin/low-stock">Низькі залишки</a>
            <a href="/docs">Swagger UI</a>
            <a href="/admin/logout">Вийти</a>
        </section>

        <section class="form-card">
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form id="editProductForm" method="post" action="/admin/products/{{ product.id }}/edit">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="name">Назва</label>
                <input id="name" type="text" name="name" value="{{ form_values.get('name', product.name) }}" required>

                <label for="price">Ціна</label>
                <input id="price" type="number" step="0.01" name="price" value="{{ form_values.get('price', product.price|money) }}" required>

                <label for="description">Опис</label>
                <textarea id="description" name="description" required>{{ form_values.get('description', product.description) }}</textarea>

                <label for="image_url">URL зображення</label>
                <input id="image_url" type="text" name="image_url" value="{{ form_values.get('image_url', product.image_url or '') }}">

                <label for="stock">Залишок</label>
                <input id="stock" type="number" name="stock" min="0" value="{{ form_values.get('stock', product.stock) }}" required>

                <label for="low_stock_threshold">Поріг низького залишку</label>
                <input id="low_stock_threshold" type="number" name="low_stock_threshold" min="1" max="100" value="{{ form_values.get('low_stock_threshold', product.low_stock_threshold) }}" required>

                <label for="category_id">ID категорії</label>
                <input id="category_id" type="number" name="category_id" min="1" value="{{ form_values.get('category_id', product.category_id) }}" required>

                <button type="button" id="openUpdateModalButton">Оновити товар</button>
            </form>
        </section>
    </main>

    <footer>
        Адмін-панель Online Shop — v4.0.0
    </footer>

    <div id="updateModal" class="modal-backdrop">
        <div class="modal">
            <h2>Оновити товар?</h2>
            <p>Ви впевнені, що хочете зберегти ці зміни товару?</p>

            <div class="modal-actions">
                <button type="button" class="cancel-update-button" id="cancelUpdateButton">
                    Скасувати
                </button>
                <button type="button" class="confirm-update-button" id="confirmUpdateButton">
                    Оновити
                </button>
            </div>
        </div>
    </div>

    <script>
        const editProductForm = document.getElementById("editProductForm");
        const updateModal = document.getElementById("updateModal");
        const openUpdateModalButton = document.getElementById("openUpdateModalButton");
        const cancelUpdateButton = document.getElementById("cancelUpdateButton");
        const confirmUpdateButton = document.getElementById("confirmUpdateButton");

        openUpdateModalButton.addEventListener("click", () => {
            updateModal.classList.add("active");
        });

        cancelUpdateButton.addEventListener("click", () => {
            updateModal.classList.remove("active");
        });

        confirmUpdateButton.addEventListener("click", () => {
            editProductForm.submit();
        });

        updateModal.addEventListener("click", (event) => {
            if (event.target === updateModal) {
                updateModal.classList.remove("active");
            }
        });
    </script>
</body>
</html>
