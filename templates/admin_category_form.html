<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; color: #222; }
        header { background: #111827; color: white; padding: 24px 40px; }
        header h1 { margin: 0; font-size: 28px; }
        header p { margin: 8px 0 0; color: #d1d5db; }
        main { padding: 40px; max-width: 700px; }
        .nav { margin-bottom: 24px; }
        .nav a { display: inline-block; margin-right: 12px; padding: 10px 14px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; }
        .nav a:hover { background: #1d4ed8; }
        .form-card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 24px; }
        label { display: block; margin: 14px 0 6px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        textarea { min-height: 100px; }
        button { margin-top: 18px; padding: 10px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; border-radius: 6px; padding: 10px 12px; margin-bottom: 14px; }
        .secondary-link { display: inline-block; margin-left: 12px; color: #2563eb; }
        footer { padding: 20px 40px; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>
    </header>

    <main>
        <section class="nav">
            <a href="/admin">Dashboard</a>
            <a href="/admin/products">Products</a>
            <a href="/admin/orders">Orders</a>
            <a href="/admin/categories">Categories</a>
            <a href="/admin/customers">Customers</a>
            <a href="/admin/low-stock">Low Stock</a>
            <a href="/docs">Swagger UI</a>
            <a href="/admin/logout">Logout</a>
        </section>

        <section class="form-card">
            {% if error %}
                <div class="error" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ action_url }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" value="{{ form_values.get('name', '') }}" required>

                {% if has_description %}
                    <label for="description">Description</label>
                    <textarea id="description" name="description">{{ form_values.get('description', '') }}</textarea>
                {% endif %}

                <button type="submit">{{ submit_label }}</button>
                <a class="secondary-link" href="/admin/categories">Back to categories</a>
            </form>
        </section>
    </main>

    <footer>
        Online Shop Admin Dashboard — v4.0.0
    </footer>
</body>
</html>
