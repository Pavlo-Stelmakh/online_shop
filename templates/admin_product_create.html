<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати товар</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            color: #222;
        }

        header {
            background: #111827;
            color: white;
            padding: 24px 40px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin: 8px 0 0;
            color: #d1d5db;
        }

        main {
            padding: 40px;
            max-width: 700px;
        }

        .nav {
            margin-bottom: 24px;
        }

        .nav a {
            display: inline-block;
            margin-right: 12px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .nav a:hover {
            background: #1d4ed8;
        }

        .form-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 24px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
        }

        button {
            margin-top: 18px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        footer {
            padding: 20px 40px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Додати товар</h1>
        <p>Створіть новий товар з адмін-панелі.</p>
    </header>

    <main>
        <section class="nav">
            <a href="/admin">Панель</a>
            <a href="/admin/products">Товари</a>
            <a href="/admin/orders">Замовлення</a>
            <a href="/admin/categories">Категорії</a>
            <a href="/admin/customers">Клієнти</a>
            <a href="/admin/low-stock">Низькі залишки</a>
            <a href="/docs">Swagger UI</a>
            <a href="/admin/logout">Вийти</a>
        </section>

        <section class="form-card">
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/admin/products/new">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="name">Назва</label>
                <input id="name" type="text" name="name" value="{{ form_values.get('name', '') }}" required>

                <label for="price">Ціна</label>
                <input id="price" type="number" step="0.01" name="price" value="{{ form_values.get('price', '') }}" required>

                <label for="description">Опис</label>
                <textarea id="description" name="description" required>{{ form_values.get('description', '') }}</textarea>

                <label for="image_url">URL зображення</label>
                <input id="image_url" type="text" name="image_url" value="{{ form_values.get('image_url', '') }}">

                <label for="stock">Залишок</label>
                <input id="stock" type="number" name="stock" min="0" value="{{ form_values.get('stock', '') }}" required>

                <label for="low_stock_threshold">Поріг низького залишку</label>
                <input id="low_stock_threshold" type="number" name="low_stock_threshold" min="1" max="100" value="{{ form_values.get('low_stock_threshold', 5) }}" required>

                <label for="category_id">ID категорії</label>
                <input id="category_id" type="number" name="category_id" min="1" value="{{ form_values.get('category_id', '') }}" required>

                <button type="submit">Додати товар</button>
            </form>
        </section>
    </main>

    <footer>
        Адмін-панель Online Shop — v4.0.0
    </footer>
</body>
</html>
