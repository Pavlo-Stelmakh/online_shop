<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            color: #222;
        }

        header {
            background: #111827;
            color: white;
            padding: 24px 40px;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin: 8px 0 0;
            color: #d1d5db;
        }

        main {
            padding: 40px;
            max-width: 500px;
        }

        .login-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 24px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            margin-top: 18px;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 14px;
        }

        footer {
            padding: 20px 40px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Admin Login</h1>
        <p>Sign in to access the Online Shop Admin Dashboard</p>
    </header>

    <main>
        <section class="login-card">
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/admin/login">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" value="{{ form_values.get('username', '') }}" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>

                <button type="submit">Login</button>
            </form>
        </section>
    </main>

    <footer>
        Online Shop Admin Dashboard — Login
    </footer>
</body>
</html>
