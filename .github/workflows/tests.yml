name: Run API Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci_test_secret_key_not_for_production
      ENVIRONMENT: test
      CI_AUDIT_DATABASE_URL: sqlite:////tmp/online_shop_ci_audit.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Alembic migrations to temporary audit database
        run: |
          DATABASE_URL="$CI_AUDIT_DATABASE_URL" python -m alembic upgrade head

      - name: Run data integrity audit on migrated temporary database
        run: |
          DATABASE_URL="$CI_AUDIT_DATABASE_URL" python scripts/audit_data_integrity.py

      - name: Run tests
        run: |
          python -m pytest
