name: Run API Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI_AUDIT_DATABASE_URL: sqlite:///./ci_audit.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations on audit database
        env:
          SECRET_KEY: ci_test_secret_key_not_for_production
          ENVIRONMENT: test
          DATABASE_URL: ${{ env.CI_AUDIT_DATABASE_URL }}
        run: |
          python -m alembic upgrade head

      - name: Run data integrity audit
        env:
          SECRET_KEY: ci_test_secret_key_not_for_production
          ENVIRONMENT: test
          DATABASE_URL: ${{ env.CI_AUDIT_DATABASE_URL }}
        run: |
          python scripts/audit_data_integrity.py

      - name: Run tests
        run: |
          python -m pytest

  postgres-migration-audit:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci_test_secret_key_not_for_production
      ENVIRONMENT: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/online_shop_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: online_shop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d online_shop_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import application with PostgreSQL settings
        run: |
          python -c "from main import app; print(app.title)"

      - name: Run Alembic migrations on PostgreSQL
        run: |
          python -m alembic upgrade head

      - name: Run data integrity audit on PostgreSQL
        run: |
          python scripts/audit_data_integrity.py
